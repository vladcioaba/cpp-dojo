<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>cpp-grandfather — filter</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0c10" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2efe7" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cpp-grandfather">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="theme.js"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-path">~/cpp-grandfather/filter</span><span class="cursor">█</span>
  </div>
  <nav class="topnav" aria-label="pages">
    <a class="nav-link" href="today.html">today</a>
    <a class="nav-link" href="index.html">feed</a>
    <a class="nav-link" href="skills.html">skills</a>
    <a class="nav-link" href="labs.html">labs</a>
    <a class="nav-link" href="sprint.html">sprint</a>
    <a class="nav-link" href="ranks.html">ranks</a>
  </nav>
  <div class="stats">
    <button class="stat theme-btn" id="themeToggle" title="day / night">☀</button>
  </div>
</header>

<main class="flt-wrap">
  <div class="flt-stats">
    <div class="stat stat-streak" title="day streak">
      <svg class="flame" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2c1 4-3 5.5-3 9a3 3 0 0 0 6 0c0-1.5-1-2.5-1-2.5s4 1.5 4 6a6 6 0 0 1-12 0c0-6 5-8 6-12.5z"/></svg>
      <span id="streak">0</span> <span class="flt-stat-cap">streak</span>
    </div>
    <div class="stat stat-xp" title="experience points">
      <span class="xp-glyph">++</span>
      <span id="xp">0</span> <span class="flt-stat-cap">xp</span>
    </div>
    <button class="stat install-btn" id="installBtn" title="install app" hidden>install ⤓</button>
  </div>

  <div class="flt-label">card type</div>
  <nav class="chips flt-chips" id="typeChips" aria-label="card type filter"></nav>

  <div class="flt-label">track</div>
  <nav class="chips flt-chips" id="trackChips" aria-label="track filter"></nav>

  <div class="flt-label">difficulty</div>
  <nav class="chips flt-chips" id="diffChips" aria-label="difficulty filter"></nav>

  <button class="btn btn-check flt-apply" id="applyBtn">open the feed ▸</button>
  <button class="btn flt-reset" id="resetBtn">reset filters</button>
</main>

<script src="filters.js"></script>
<script src="pwa.js"></script>
</body>
</html>
