<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>cpp-dojo — daily C++ grind</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0c10" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2efe7" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cpp-dojo">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="theme.js"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-path">~/cpp-dojo</span><span class="cursor">█</span>
  </div>
  <nav class="topnav" aria-label="pages">
    <a class="nav-link" href="today.html">today</a>
    <a class="nav-link active" aria-current="page" href="index.html">feed</a>
    <a class="nav-link" href="skills.html">skills</a>
    <a class="nav-link" href="labs.html">labs</a>
    <a class="nav-link" href="sprint.html">sprint</a>
    <a class="nav-link" href="ranks.html">ranks</a>
  </nav>
  <div class="stats">
    <div class="stat stat-streak" title="day streak">
      <svg class="flame" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2c1 4-3 5.5-3 9a3 3 0 0 0 6 0c0-1.5-1-2.5-1-2.5s4 1.5 4 6a6 6 0 0 1-12 0c0-6 5-8 6-12.5z"/></svg>
      <span id="streak">0</span>
    </div>
    <div class="stat stat-xp" title="experience points" aria-live="polite">
      <span class="xp-glyph">++</span>
      <span id="xp">0</span>
    </div>
    <button class="stat mode-btn" id="modeToggle" title="switch to HFT prep mode">⚡ HFT prep</button>
    <button class="stat diff-btn" id="diffToggle" title="filter by difficulty">◇ any level</button>
    <button class="stat install-btn" id="installBtn" title="install app" hidden>install ⤓</button>
    <button class="stat theme-btn" id="themeToggle" title="day / night">☀</button>
  </div>
</header>

<nav class="chips" id="chips" aria-label="card type filter">
  <button class="chip active" data-filter="all">all</button>
  <button class="chip" data-filter="fact">facts</button>
  <button class="chip" data-filter="quiz">quiz</button>
  <button class="chip" data-filter="exercise">write</button>
  <button class="chip" data-filter="challenge">challenges</button>
  <button class="chip" data-filter="snippet">snippets</button>
  <button class="chip chip-review" data-filter="review">review <span class="due-badge" id="dueCount" hidden></span></button>
</nav>

<nav class="chips chips-tracks" id="trackChips" aria-label="track filter"></nav>

<main class="feed" id="feed">
  <div class="loading">compiling today's mix<span class="dots"></span></div>
</main>
<div class="pos-pill" id="posPill" hidden>1 / 1</div>

<footer class="hints">
  <span><kbd>j</kbd>/<kbd>k</kbd> scroll cards</span>
  <span id="daymix"></span>
</footer>

<script src="highlight.js"></script>
<script src="app.js"></script>
<script src="pwa.js"></script>
</body>
</html>
