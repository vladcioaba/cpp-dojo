<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>cpp-dojo — daily C++ grind</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="theme.js"></script>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-path">~/cpp-dojo</span><span class="cursor">█</span>
  </div>
  <nav class="topnav">
    <a class="nav-link active" href="index.html">feed</a>
    <a class="nav-link" href="labs.html">labs</a>
    <a class="nav-link" href="ranks.html">ranks</a>
  </nav>
  <div class="stats">
    <div class="stat stat-streak" title="day streak">
      <svg class="flame" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2c1 4-3 5.5-3 9a3 3 0 0 0 6 0c0-1.5-1-2.5-1-2.5s4 1.5 4 6a6 6 0 0 1-12 0c0-6 5-8 6-12.5z"/></svg>
      <span id="streak">0</span>
    </div>
    <div class="stat stat-xp" title="experience points">
      <span class="xp-glyph">++</span>
      <span id="xp">0</span>
    </div>
    <button class="stat theme-btn" id="themeToggle" title="day / night">☀</button>
  </div>
</header>

<nav class="chips" id="chips">
  <button class="chip active" data-filter="all">all</button>
  <button class="chip" data-filter="fact">facts</button>
  <button class="chip" data-filter="quiz">quiz</button>
  <button class="chip" data-filter="exercise">write</button>
  <button class="chip" data-filter="snippet">snippets</button>
</nav>

<main class="feed" id="feed">
  <div class="loading">compiling today's mix<span class="dots"></span></div>
</main>

<footer class="hints">
  <span><kbd>j</kbd>/<kbd>k</kbd> scroll cards</span>
  <span id="daymix"></span>
</footer>

<script src="highlight.js"></script>
<script src="app.js"></script>
</body>
</html>
